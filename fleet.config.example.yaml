# Marshal fleet config - declare N named clients. Copy to `fleet.config.yaml` and edit.
# Each client pins a backend + permission + model.
#
# AUTH IS PER-CLI: authenticate each backend by running its own login once (e.g.
# `opencode auth login`, `cursor-agent login`, `codex login`). Marshal does not need an API key
# of its own and does not install the backend CLIs.
#
# `secret_ref: env:VAR` is OPTIONAL and ADVISORY: `marshal doctor` warns if VAR is unset, but
# Marshal does NOT inject it into the backend - the CLI's own login is what authenticates. If you
# logged the CLI in, you can omit secret_ref entirely.

defaults:
  permission: safe-edit        # read-only | safe-edit | yolo
  timeout_s: 600

# Optional: a command run once in each fresh worktree before the agent starts, e.g. to provision a
# venv so the agent's `uv run pytest`/`ruff`/`mypy` target the worktree (not the driver's venv).
# Accepts a string or an argv list; omit it entirely for repos that need no setup. Marshal scrubs
# the driver's VIRTUAL_ENV so the command targets the worktree. A non-zero exit fails the run early.
# worktree_setup: uv sync --extra dev --extra mcp

# Optional: a gate command run in the worktree AFTER a run that would otherwise be `succeeded`
# and actually changed files (e.g. the repo's full test suite - agents love passing their own
# narrower subset; text-only replies are never gated). A non-zero exit marks the run
# `verify_failed` instead of `succeeded`; the worktree and diff are KEPT for review, and the
# command's output tail lands on the run record (`verify_output`). Same string-or-argv shape and
# env hygiene as worktree_setup. Omit to trust the agent's own outcome.
# verify: uv run pytest -q

# How many times to re-run a run that failed for a TRANSIENT reason (DB lock, rate limit, 5xx,
# connection error) - with exponential backoff. Defaults to 2; set 0 to disable. Genuine task
# failures and timeouts are never retried.
retries: 2

# Optional fleet-wide layered context.
#   worker: text prepended to EVERY worker agent's goal (shared operating assumptions - coding
#           style, repo quirks). Omit for no extra context.
#   driver: text surfaced back to the driver (e.g. via list_clients over MCP) so it knows how the
#           fleet is configured. Omit for none.
# context:
#   worker: |
#     Prefer small, focused commits. Run `uv run pytest -q` before finishing.
#     Target Python 3.12; do not introduce new dependencies.
#   driver: Fleet runs read-only review + safe-edit implementation; integrate manually.

# Optional model catalog - pure data the driver can read with `marshal models` / `list_models`.
# Each entry: id (provider/model), backends that can run it, and short free-form strings for cost
# (e.g. native|admin-api|estimated|unavailable), quota_type (metered|subscription|unavailable), and
# notes. The catalog is metadata only - it does NOT change routing (clients still own backend+model).
# Absent or empty = no catalog to expose.
# models:
#   - id: <provider>/<model-a>
#     backends: [opencode]
#     cost: native
#     quota_type: subscription
#     notes: placeholder
#   - id: <provider>/<model-b>
#     backends: [claude-code, cursor]
#     cost: estimated
#     quota_type: metered
#     notes: placeholder

# Optional $ budgets - checked at run start before worktree creation. Default is soft-warn only;
# set enforce: true to refuse matching spawns when spend already meets the cap, and to serialize
# matching in-flight spawns (one at a time) so parallel fan-out cannot overshoot before spend is
# recorded. Scope to a backend, a client, or the whole fleet (omit both backend and client).
# window is session | week | month. Subscription / unknown-cost backends report $0, so a budget
# on them never triggers.
# budgets:
#   - client: planner
#     window: week
#     limit_usd: 25.0
#     enforce: true
#   - backend: claude-code
#     window: month
#     limit_usd: 100.0
#   - window: session
#     limit_usd: 10.0

# Optional Marshal Recall memory layer (Cognee-backed, off by default). When enabled, Marshal
# remembers each run's outcome and recalls relevant learnings into the next worker's goal.
# Needs the [memory] extra + Cognee env (export LLM_API_KEY — do not inline llm_api_key in YAML);
# see docs/marshal-recall.md.
# memory:
#   enabled: true
#   recall_top_k: 5

clients:
  # OpenCode. Omit `model` and it defaults to opencode-go/glm-5.2 (the Go subscription); a
  # fireworks-ai/* model is rejected at load so you never burn Fireworks credits.
  # Auth: `opencode auth login`.
  implementer:
    backend: opencode
    model: opencode-go/glm-5.2
    permission: safe-edit
    secret_ref: env:OPENCODE_API_KEY   # optional preflight check; see header

  # Cursor for read-only review passes (no edits). Auth: `cursor-agent login`.
  reviewer:
    backend: cursor
    permission: read-only

  # Codex (workspace-write under safe-edit). Auth: `codex login` (ChatGPT) or set OPENAI_API_KEY.
  refactorer:
    backend: codex
    permission: safe-edit

  # Claude Code (`claude -p`). Reports native cost (total_cost_usd) + tokens - honest $/run, no
  # estimation. Auth: run `claude` and log in, or set ANTHROPIC_API_KEY. Bump the model to
  # claude-opus-4-8 for harder tasks.
  planner:
    backend: claude-code
    model: claude-sonnet-4-6
    permission: safe-edit
    secret_ref: env:ANTHROPIC_API_KEY   # optional preflight check; see header

  # Optional per-client usage API - fetch REAL post-run cost from a provider admin API instead of
  # the local price table. Unset = estimated or unavailable. See docs/config.md.
  # metered:
  #   backend: opencode
  #   model: opencode-go/glm-5.2
  #   permission: safe-edit
  #   usage_api: eastrouter
