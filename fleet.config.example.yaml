# Marshal fleet config - declare N named clients. Copy to `fleet.config.yaml` and edit.
# Each client pins a backend + permission + model.
#
# AUTH IS PER-CLI: authenticate each backend by running its own login once (e.g.
# `opencode auth login`, `cursor-agent login`, `codex login`). Marshal does not need an API key
# of its own and does not install the backend CLIs.
#
# `secret_ref: env:VAR` is OPTIONAL and ADVISORY: `marshal doctor` warns if VAR is unset, but
# Marshal does NOT inject it into the backend - the CLI's own login is what authenticates. If you
# logged the CLI in, you can omit secret_ref entirely.

defaults:
  permission: safe-edit        # read-only | safe-edit | yolo
  timeout_s: 600

# Optional: a command run once in each fresh worktree before the agent starts, e.g. to provision a
# venv so the agent's `uv run pytest`/`ruff`/`mypy` target the worktree (not the driver's venv).
# Accepts a string or an argv list; omit it entirely for repos that need no setup. Marshal scrubs
# the driver's VIRTUAL_ENV so the command targets the worktree. A non-zero exit fails the run early.
# worktree_setup: uv sync --extra dev --extra mcp

clients:
  # OpenCode. Omit `model` and it defaults to opencode-go/glm-5.2 (the Go subscription); a
  # fireworks-ai/* model is rejected at load so you never burn Fireworks credits.
  # Auth: `opencode auth login`.
  implementer:
    backend: opencode
    model: opencode-go/glm-5.2
    permission: safe-edit
    secret_ref: env:OPENCODE_API_KEY   # optional preflight check; see header

  # Cursor for read-only review passes (no edits). Auth: `cursor-agent login`.
  reviewer:
    backend: cursor
    permission: read-only

  # Codex (workspace-write under safe-edit). Auth: `codex login` (ChatGPT) or set OPENAI_API_KEY.
  refactorer:
    backend: codex
    permission: safe-edit

  # Claude Code (`claude -p`). Reports native cost (total_cost_usd) + tokens - honest $/run, no
  # estimation. Auth: run `claude` and log in, or set ANTHROPIC_API_KEY. Bump the model to
  # claude-opus-4-8 for harder tasks.
  planner:
    backend: claude-code
    model: claude-sonnet-4-6
    permission: safe-edit
    secret_ref: env:ANTHROPIC_API_KEY   # optional preflight check; see header
