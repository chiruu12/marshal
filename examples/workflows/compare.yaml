# Compare recipe — run the SAME task across several clients and collect every diff, so you can pick
# the best implementation by reading them side by side. Because all runs in a fan_out share one
# task_id, `marshal report <task_id>` and `marshal usage` will show what each strategy cost.
# Copy this into <repo>/workflows/ and replace the client names with your own.
name: compare
description: Run one task across clients and collect all diffs to compare implementations.
inputs:
  - task
phases:
  - name: candidates
    run: fan_out
    clients: [model-a, model-b, model-c]   # <- your client names from fleet.config.yaml
    goal: "{task}"
  - run: collect                           # surface every candidate's diff (sources from `candidates`)
