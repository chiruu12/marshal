name: Feature request
description: Suggest an improvement or new capability
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do, and what's getting in the way?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - new backend adapter
        - MCP tool surface
        - usage / cost tracking
        - benchmark / report
        - worktree / integrate
        - CLI
        - docs
        - other
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
